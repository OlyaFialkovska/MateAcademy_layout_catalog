<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Catalog</title>
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="styles/index.scss"
    />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    >

  </head>
  <body>
    <header class="header">
      <a
        class="header__link header__link--logo"
        href="#logo"
      >
        <img
          class="header__logo-img"
          src="./images/logo.png"
          alt="logo moyo"
        />
      </a>

      <nav class="header__nav">
        <ul class="header__nav-list">
          <li class="header__nav-item">
            <a
              class="header__link header__link--nav header__link--active"
              href="#apple"
            >
              Apple
            </a>
          </li>

          <li class="header__nav-item">
            <a
              class="header__link header__link--nav"
              href="#samsung"
            >
              Samsung
            </a>
          </li>

          <li class="header__nav-item">
            <a
              class="header__link header__link--nav"
              href="#smartphones"
            >
              Smartphones
            </a>
          </li>

          <li class="header__nav-item">
            <a
              class="header__link header__link--nav"
              href="#laptops-and-computers"
              data-qa="hover"
            >
              Laptops & Computers
            </a>
          </li>

          <li class="header__nav-item">
            <a
              class="header__link header__link--nav"
              href="#gadgets"
            >
              Gadgets
            </a>
          </li>

          <li class="header__nav-item">
            <a
              class="header__link header__link--nav"
              href="#tablets"
            >
              Tablets
            </a>
          </li>

          <li class="header__nav-item">
            <a
              class="header__link header__link--nav"
              href="#photo"
            >
              Photo
            </a>
          </li>

          <li class="header__nav-item">
            <a
              class="header__link header__link--nav"
              href="#video"
            >
              Video
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <div
        data-qa="card"
        class="card"
      >

        <img
          class="card__image"
          src="images/imac.jpeg"
          alt="Apple A1419 iMac"
        />

        <div class="card__content">
          <p class="card__text card__text--product-name">
            APPLE A1419 iMac 27" Retina
            <br />
            5K Monoblock (MNED2UA/A)
          </p>

          <p class="card__text card__text--product-code">Product code: 195434</p>

          <div class="card__review">
            <div class="stars stars--4">
              <div class="stars__star"></div>
              <div class="stars__star"></div>
              <div class="stars__star"></div>
              <div class="stars__star"></div>
              <div class="stars__star"></div>
            </div>

            <p class="card__text card__text--review-text">Reviews: 5</p>
          </div>

          <div class="card__price">
            <p class="card__text card__text--price-label">Price:</p>

            <p class="card__text card__text--price-value">$2,199</p>
          </div>

          <a
            data-qa="hover"
            href="#"
            class="card__button"
          >
            Buy
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
